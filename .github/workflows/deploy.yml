name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # El runner de GitHub se une al tailnet como nodo efímero con tag:ci.
      # El nodo se destruye automáticamente al terminar el job.
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # Verifica conectividad con el servidor antes de intentar el SSH.
      # Espera hasta 3 minutos a que el nodo efímero se propague en el tailnet.
      - name: Verify connectivity
        run: tailscale ping ${{ secrets.SERVER_HOST }}

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # POSTGRES_PASSWORD se pasa como variable de entorno al script remoto,
          # nunca interpolada directamente en el texto del script.
          envs: POSTGRES_PASSWORD
          script: |
            set -e
            cd ~/erp
            git pull

            # Regenerar .env desde los secretos de GitHub
            echo "POSTGRES_DB=postgres" > .env
            echo "POSTGRES_USER=odoo" >> .env
            echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" >> .env

            docker compose up -d --remove-orphans
            docker compose ps
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
