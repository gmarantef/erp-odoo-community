[options]

; -----------------------------------------------------------------------------
; Rutas
; -----------------------------------------------------------------------------
; Las tres rutas que la imagen oficial de Odoo 18 expone por defecto.
; /mnt/extra-addons es el punto de montaje para addons externos (OCA, propios).
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/var/lib/odoo/addons/18.0,/mnt/extra-addons
data_dir = /var/lib/odoo

; -----------------------------------------------------------------------------
; Base de datos
; -----------------------------------------------------------------------------
; Los parámetros de conexión (host, user, password) los inyecta el entrypoint
; de la imagen Docker a partir de las variables de entorno HOST, USER, PASSWORD.
; No se definen aquí para evitar duplicidad con el docker-compose.
;
; dbfilter limita qué bases de datos son accesibles. En producción se ajustará
; al nombre de dominio para que cada hostname solo vea su propia DB.
; Ref: https://www.odoo.com/documentation/18.0/administration/on_premise/deploy.html#dbfilter
dbfilter = .*

; -----------------------------------------------------------------------------
; Logging
; -----------------------------------------------------------------------------
; logfile vacío → Odoo escribe en stdout, que Docker captura con `docker logs`.
; Nunca escribir a fichero dentro del contenedor (se perdería en cada recreación).
log_level = info

; -----------------------------------------------------------------------------
; Proxy inverso
; -----------------------------------------------------------------------------
; Necesario cuando Odoo está detrás de Traefik (o cualquier reverse proxy).
; Permite que Odoo confíe en las cabeceras X-Forwarded-For y X-Forwarded-Proto
; para obtener la IP real del cliente y el protocolo (https).
; ATENCIÓN: activar esto sin proxy real es un riesgo de seguridad (spoofing).
; En local (sin Traefik) no hay riesgo porque el puerto solo escucha en localhost.
proxy_mode = True

; -----------------------------------------------------------------------------
; Workers
; -----------------------------------------------------------------------------
; workers = 0 → modo threading (un proceso, múltiples hilos).
; Adecuado para desarrollo y para producción con carga baja (<10 simultáneos).
; Para producción ajustar a: (#CPU * 2) + 1
; Pendiente: confirmar nº de CPUs del mini PC para calcular el valor óptimo.
workers = 0

; max_cron_threads: hilos dedicados a tareas programadas (cron).
; Con workers = 0, el cron corre en el mismo proceso. Con workers > 0, son
; procesos separados. Valor 1 es suficiente para esta carga.
max_cron_threads = 1

; -----------------------------------------------------------------------------
; Límites de recursos (relevantes con workers > 0)
; -----------------------------------------------------------------------------
; Con workers = 0 (threading) estos límites no se aplican por worker.
; Se documentan aquí para cuando se active el modo multiprocess en producción.
;
; limit_memory_soft: el worker se reinicia limpiamente al superar este límite.
; limit_memory_hard: el worker se mata inmediatamente al superar este límite.
; Valores en bytes. Ref oficial: 2 GB soft, 2.5 GB hard.
limit_memory_soft = 2147483648
limit_memory_hard = 2684354560

; limit_time_cpu: segundos de CPU máximos por petición.
; limit_time_real: segundos reales máximos por petición (incluye I/O y esperas).
; limit_time_real_cron: segundos reales máximos por job de cron (0 = sin límite).
limit_time_cpu = 60
limit_time_real = 120
limit_time_real_cron = 0
